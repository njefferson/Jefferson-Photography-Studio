<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0b0d" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Infrared Photography Studio</title>
  </head>
  <body>
    <div id="app">
      <header class="bar">
        <span class="brand">
          Infrared Photography Studio
          <button id="infoBtn" class="info-btn" type="button" aria-label="What's new">i</button>
        </span>
        <label class="open-btn">
          Open image
          <input id="file" type="file" accept=".dng,.nef,.zip,image/*" hidden />
        </label>
      </header>

      <div id="stage">
        <canvas id="view"></canvas>
        <p id="hint">Open a DNG (or a .zip of one) to begin.</p>
      </div>

      <aside id="panel" hidden>
        <fieldset>
          <legend>White balance &amp; exposure <small>(no 2000K floor)</small></legend>
          <button id="autoBtn" type="button">Auto (white balance + exposure)</button>
          <label>Exposure <input id="expo" type="range" min="0.1" max="16" step="0.01" value="1" /></label>
          <label>Red gain <input id="wbR" type="range" min="0.02" max="16" step="0.01" value="1" /></label>
          <label>Green gain <input id="wbG" type="range" min="0.02" max="16" step="0.01" value="1" /></label>
          <label>Blue gain <input id="wbB" type="range" min="0.02" max="16" step="0.01" value="1" /></label>
          <small style="color:#80808a">Tip: tap foliage in the image to set white balance.</small>
        </fieldset>

        <fieldset>
          <legend>Channel swap</legend>
          <select id="swap">
            <option value="none">None</option>
            <option value="rb" selected>Red ↔ Blue (classic)</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>Looks</legend>
          <div class="look-row">
            <button id="lookAero" type="button">Aerochrome</button>
            <button id="lookRed" type="button">Aero Red</button>
            <button id="lookGoldie" type="button">Goldie</button>
            <button id="lookNatural" type="button">Natural IR</button>
            <button id="lookMono" type="button">B&amp;W IR</button>
          </div>
        </fieldset>

        <fieldset>
          <legend>Hue / Saturation / Tone</legend>
          <label>Hue shift <input id="hue" type="range" min="-180" max="180" step="1" value="0" /></label>
          <label>Saturation <input id="sat" type="range" min="0" max="3" step="0.01" value="1" /></label>
          <label>Contrast <input id="con" type="range" min="0.5" max="2" step="0.01" value="1" /></label>
        </fieldset>

        <fieldset>
          <legend>Export</legend>
          <label>Format
            <select id="exFormat">
              <option value="jpeg">JPEG</option>
              <option value="tiff">16-bit TIFF</option>
            </select>
          </label>
          <label>Resolution
            <select id="exScale">
              <option value="1">Full (native)</option>
              <option value="0.5">50%</option>
              <option value="0.25">25%</option>
            </select>
          </label>
          <label id="exQualityRow">Quality <input id="exQuality" type="range" min="0.5" max="1" step="0.01" value="0.92" /></label>
          <button id="exBtn" type="button">Export &amp; Save</button>
        </fieldset>

        <fieldset>
          <legend>Profiles &amp; LUTs <small>(your look, reusable)</small></legend>
          <label><input id="profWB" type="checkbox" /> Bake current white balance in</label>
          <button id="cubeBtn" type="button">Export .cube (Photoshop / video)</button>
          <button id="dcpBtn" type="button">Export .dcp (Lightroom — beta)</button>
        </fieldset>
      </aside>
    </div>

    <dialog id="infoDlg">
      <h2>What's new</h2>
      <ol id="changeList" reversed></ol>
      <button id="infoClose" type="button">Close</button>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
