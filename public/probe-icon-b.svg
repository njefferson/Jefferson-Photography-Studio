<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Probe style B: "Light" — silver tile, graphite monochrome aperture.
       Deliberately the opposite of A (light vs dark, mono vs rainbow) so that
       at home-screen size there is no mistaking which icon iOS installed.

       Shaded by ONE light source (upper-left): blade lightness varies smoothly
       around the ring — brightest on the blade facing the light (b3), darkest
       opposite (b0), symmetric in between — so it reads as a lit metal iris,
       not a desaturated rainbow of unrelated greys. -->
  <defs>
    <linearGradient id="btile" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1f1f5"/><stop offset="1" stop-color="#c7c7d0"/></linearGradient>
    <!-- lightness runs b0 (dark, away from light) → b3 (bright, toward light) -->
    <linearGradient id="b0" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#46464f"/><stop offset="1" stop-color="#38383f"/></linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5e5e68"/><stop offset="1" stop-color="#4e4e57"/></linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7c7c86"/><stop offset="1" stop-color="#6a6a73"/></linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9a9aa4"/><stop offset="1" stop-color="#86868f"/></linearGradient>
    <linearGradient id="b4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7c7c86"/><stop offset="1" stop-color="#6a6a73"/></linearGradient>
    <linearGradient id="b5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5e5e68"/><stop offset="1" stop-color="#4e4e57"/></linearGradient>
    <radialGradient id="bhole" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#2a2a30"/>
      <stop offset="1" stop-color="#0f0f12"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#btile)"/>
  <circle cx="256" cy="256" r="182" fill="#dcdce2"/>
  <g>
    <path d="M 332.03 225.28 L 426.62 299.18 A 176 176 0 0 1 303.91 425.35 L 320.62 306.48 Z" fill="url(#b0)"/>
    <path d="M 320.62 306.48 L 303.91 425.35 A 176 176 0 0 1 133.29 382.17 L 244.59 337.2 Z" fill="url(#b1)"/>
    <path d="M 244.59 337.2 L 133.29 382.17 A 176 176 0 0 1 85.38 212.82 L 179.97 286.72 Z" fill="url(#b2)"/>
    <path d="M 179.97 286.72 L 85.38 212.82 A 176 176 0 0 1 208.09 86.65 L 191.38 205.52 Z" fill="url(#b3)"/>
    <path d="M 191.38 205.52 L 208.09 86.65 A 176 176 0 0 1 378.71 129.83 L 267.41 174.8 Z" fill="url(#b4)"/>
    <path d="M 267.41 174.8 L 378.71 129.83 A 176 176 0 0 1 426.62 299.18 L 332.03 225.28 Z" fill="url(#b5)"/>
  </g>
  <!-- faint seams to sell the blade-over-blade overlap -->
  <g stroke="#000" stroke-opacity="0.16" stroke-width="3">
    <line x1="332.03" y1="225.28" x2="426.62" y2="299.18"/>
    <line x1="320.62" y1="306.48" x2="303.91" y2="425.35"/>
    <line x1="244.59" y1="337.2" x2="133.29" y2="382.17"/>
    <line x1="179.97" y1="286.72" x2="85.38" y2="212.82"/>
    <line x1="191.38" y1="205.52" x2="208.09" y2="86.65"/>
    <line x1="267.41" y1="174.8" x2="378.71" y2="129.83"/>
  </g>
  <polygon points="267.41,174.8 332.03,225.28 320.62,306.48 244.59,337.2 179.97,286.72 191.38,205.52" fill="url(#bhole)"/>
  <!-- corner tag -->
  <circle cx="418" cy="418" r="58" fill="#f1f1f5" stroke="#3a3a42" stroke-opacity="0.85" stroke-width="6"/>
  <text x="418" y="418" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#2a2a30">B</text>
</svg>
