<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Studio icon · "Graphite" — a light, brushed-metal iris on a silver tile.
       Same aperture geometry as the default (studio-icon.svg); the palette is
       monochrome, lit by ONE light source (upper-left) so blade lightness runs
       smoothly around the ring — brightest on the blade facing the light (m3),
       darkest opposite (m0) — reading as a machined metal iris, not a flat grey
       fan. The understated, classy alternative to the full-colour default. -->
  <defs>
    <linearGradient id="gtile" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f1f1f5"/><stop offset="1" stop-color="#c7c7d0"/></linearGradient>
    <linearGradient id="m0" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#46464f"/><stop offset="1" stop-color="#38383f"/></linearGradient>
    <linearGradient id="m1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5e5e68"/><stop offset="1" stop-color="#4e4e57"/></linearGradient>
    <linearGradient id="m2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7c7c86"/><stop offset="1" stop-color="#6a6a73"/></linearGradient>
    <linearGradient id="m3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9a9aa4"/><stop offset="1" stop-color="#86868f"/></linearGradient>
    <linearGradient id="m4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7c7c86"/><stop offset="1" stop-color="#6a6a73"/></linearGradient>
    <linearGradient id="m5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5e5e68"/><stop offset="1" stop-color="#4e4e57"/></linearGradient>
    <radialGradient id="ghole" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#2a2a30"/>
      <stop offset="1" stop-color="#0f0f12"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#gtile)"/>
  <circle cx="256" cy="256" r="182" fill="#dcdce2"/>
  <g>
    <path d="M 332.03 225.28 L 426.62 299.18 A 176 176 0 0 1 303.91 425.35 L 320.62 306.48 Z" fill="url(#m0)"/>
    <path d="M 320.62 306.48 L 303.91 425.35 A 176 176 0 0 1 133.29 382.17 L 244.59 337.2 Z" fill="url(#m1)"/>
    <path d="M 244.59 337.2 L 133.29 382.17 A 176 176 0 0 1 85.38 212.82 L 179.97 286.72 Z" fill="url(#m2)"/>
    <path d="M 179.97 286.72 L 85.38 212.82 A 176 176 0 0 1 208.09 86.65 L 191.38 205.52 Z" fill="url(#m3)"/>
    <path d="M 191.38 205.52 L 208.09 86.65 A 176 176 0 0 1 378.71 129.83 L 267.41 174.8 Z" fill="url(#m4)"/>
    <path d="M 267.41 174.8 L 378.71 129.83 A 176 176 0 0 1 426.62 299.18 L 332.03 225.28 Z" fill="url(#m5)"/>
  </g>
  <!-- faint seams to sell the blade-over-blade overlap -->
  <g stroke="#000" stroke-opacity="0.16" stroke-width="3">
    <line x1="332.03" y1="225.28" x2="426.62" y2="299.18"/>
    <line x1="320.62" y1="306.48" x2="303.91" y2="425.35"/>
    <line x1="244.59" y1="337.2" x2="133.29" y2="382.17"/>
    <line x1="179.97" y1="286.72" x2="85.38" y2="212.82"/>
    <line x1="191.38" y1="205.52" x2="208.09" y2="86.65"/>
    <line x1="267.41" y1="174.8" x2="378.71" y2="129.83"/>
  </g>
  <polygon points="267.41,174.8 332.03,225.28 320.62,306.48 244.59,337.2 179.97,286.72 191.38,205.52" fill="url(#ghole)"/>
</svg>
