<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Studio icon · "Noir" — a dark machined-metal iris on the near-black tile
       the other Studio icons share. Same aperture geometry as the default
       (studio-icon.svg); the blades are lit from the upper-left so lightness
       runs smoothly around the ring (brightest facing the light, n3; darkest
       opposite, n0), reading as a milled metal iris. Darker and more restrained
       than Graphite — the same silhouette as the colour default, in shadow. -->
  <defs>
    <linearGradient id="n0" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#242429"/><stop offset="1" stop-color="#1b1b1f"/></linearGradient>
    <linearGradient id="n1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34343b"/><stop offset="1" stop-color="#282830"/></linearGradient>
    <linearGradient id="n2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4a4a54"/><stop offset="1" stop-color="#3a3a43"/></linearGradient>
    <linearGradient id="n3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6d6d78"/><stop offset="1" stop-color="#565661"/></linearGradient>
    <linearGradient id="n4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4a4a54"/><stop offset="1" stop-color="#3a3a43"/></linearGradient>
    <linearGradient id="n5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#34343b"/><stop offset="1" stop-color="#282830"/></linearGradient>
    <radialGradient id="nhole" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#141418"/>
      <stop offset="1" stop-color="#050506"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0b0b0d"/>
  <circle cx="256" cy="256" r="182" fill="#141418"/>
  <g>
    <path d="M 332.03 225.28 L 426.62 299.18 A 176 176 0 0 1 303.91 425.35 L 320.62 306.48 Z" fill="url(#n0)"/>
    <path d="M 320.62 306.48 L 303.91 425.35 A 176 176 0 0 1 133.29 382.17 L 244.59 337.2 Z" fill="url(#n1)"/>
    <path d="M 244.59 337.2 L 133.29 382.17 A 176 176 0 0 1 85.38 212.82 L 179.97 286.72 Z" fill="url(#n2)"/>
    <path d="M 179.97 286.72 L 85.38 212.82 A 176 176 0 0 1 208.09 86.65 L 191.38 205.52 Z" fill="url(#n3)"/>
    <path d="M 191.38 205.52 L 208.09 86.65 A 176 176 0 0 1 378.71 129.83 L 267.41 174.8 Z" fill="url(#n4)"/>
    <path d="M 267.41 174.8 L 378.71 129.83 A 176 176 0 0 1 426.62 299.18 L 332.03 225.28 Z" fill="url(#n5)"/>
  </g>
  <!-- highlight seams (light, not shadow — the metal catches light along overlaps) -->
  <g stroke="#ffffff" stroke-opacity="0.10" stroke-width="2">
    <line x1="332.03" y1="225.28" x2="426.62" y2="299.18"/>
    <line x1="320.62" y1="306.48" x2="303.91" y2="425.35"/>
    <line x1="244.59" y1="337.2" x2="133.29" y2="382.17"/>
    <line x1="179.97" y1="286.72" x2="85.38" y2="212.82"/>
    <line x1="191.38" y1="205.52" x2="208.09" y2="86.65"/>
    <line x1="267.41" y1="174.8" x2="378.71" y2="129.83"/>
  </g>
  <polygon points="267.41,174.8 332.03,225.28 320.62,306.48 244.59,337.2 179.97,286.72 191.38,205.52" fill="url(#nhole)"/>
  <polygon points="267.41,174.8 332.03,225.28 320.62,306.48 244.59,337.2 179.97,286.72 191.38,205.52" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>
</svg>
