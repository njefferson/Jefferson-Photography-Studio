<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0d" />
    <title>Photography Studio has moved</title>
    <!-- Cloudflare's _redirects sends a 301 server-side; this page is the
         fallback if that isn't honoured (and clears any old install below). -->
    <meta http-equiv="refresh" content="1; url=https://jefferson-photo-studio.pages.dev/" />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; }
      body {
        background: #0b0b0d;
        color: #f2f2f4;
        font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        text-align: center;
      }
      main { max-width: 30rem; }
      h1 { font-size: 1.4rem; font-weight: 700; margin: 0 0 0.5rem; }
      p { color: #b8b8c0; margin: 0.5rem 0; }
      a.go {
        display: inline-block;
        margin: 1.1rem 0 0.5rem;
        padding: 0.7rem 1.2rem;
        border-radius: 10px;
        background: linear-gradient(120deg, #ff2fb0, #7a1cff 55%, #12b6ff);
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      .hint { font-size: 0.85rem; color: #80808a; margin-top: 1rem; }
      code { color: #cfcfd6; }
    </style>
  </head>
  <body>
    <main>
      <h1>Photography Studio has moved</h1>
      <p>It now lives at a new address:</p>
      <a class="go" id="go" href="https://jefferson-photo-studio.pages.dev/">jefferson-photo-studio.pages.dev →</a>
      <p class="hint">
        Please update your bookmark. If you added the old app to your Home Screen,
        remove that icon and add it again from the new address.
      </p>
    </main>
    <script>
      // Old visitors may carry a service worker + cached shell from when the app
      // lived here; clear both so nothing intercepts the move, then go — keeping
      // the original path (e.g. /macro.html) so deep links still land right.
      (async () => {
        try {
          if ("serviceWorker" in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          }
          if (window.caches) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
          }
        } catch (e) {
          /* best effort — the link below always works */
        }
        const path = location.pathname.replace(/^\/+/, "") + location.search + location.hash;
        location.replace("https://jefferson-photo-studio.pages.dev/" + path);
      })();
    </script>
  </body>
</html>
