# Manual overlay-asset generation run. Trigger from the GitHub Actions UI
# (works from the iPad browser) — no CLI needed. It renders on the chosen
# provider (Flux photoreal by default, cut out via Ideogram remove-background),
# generates a bounded batch, and publishes the images for review. It does NOT
# commit anything or touch the app, main, or staging — promoting reviewed assets
# into public/stickers/ stays a deliberate session step behind the staging gate.
#
# Only this file lives on main (so the manual trigger is available); the factory
# code it runs is checked out from `ref` (the asset-pipeline branch by default),
# so the still-evolving tooling stays off main until it merges on its own.
name: asset-factory

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to run the factory code from"
        type: string
        default: claude/jefferson-asset-pipeline-9y19wa
      provider:
        description: "Image provider (flux = photoreal render + Ideogram cutout)"
        type: choice
        default: flux
        options: [flux, ideogram, mock]
      category:
        description: "Category filter (blank = all). e.g. cryptids,ufo"
        type: string
        default: cryptids
      per_category:
        description: "Breadth-first: max entries PER category this run (blank = no cap)"
        type: string
        default: ""
      limit:
        description: "Max images this run (cost guard — ideogram is ~$0.08 each)"
        type: string
        default: "10"
      confirm:
        description: "Actually spend? Unchecked = dry-run (prompts + cost only)"
        type: boolean
        default: false

# Never run this on a push; manual only.
concurrency: asset-factory-${{ github.ref }}

# Needs write access to push the review batch to its throwaway branch.
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install factory deps
        working-directory: asset-factory
        run: npm install

      - name: Plan (counts + cost estimate)
        working-directory: asset-factory
        run: node cli.mjs plan --provider "${{ inputs.provider }}" ${{ inputs.category && format('--category {0}', inputs.category) || '' }}

      - name: Generate
        working-directory: asset-factory
        env:
          IDEOGRAM_API_KEY: ${{ secrets.IDEOGRAM_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          node cli.mjs generate \
            --provider "${{ inputs.provider }}" \
            ${{ inputs.category && format('--category {0}', inputs.category) || '' }} \
            ${{ inputs.per_category && format('--per-category {0}', inputs.per_category) || '' }} \
            --limit "${{ inputs.limit }}" \
            ${{ inputs.confirm && '--yes' || '--dry-run' }}

      - name: Stats
        if: ${{ inputs.confirm }}
        working-directory: asset-factory
        run: node cli.mjs stats ${{ inputs.category && format('--category {0}', inputs.category) || '' }}

      # Publish the approved batch as viewable PNGs + a contact sheet, then push
      # them to a throwaway branch. A session reads them back over the GitHub API
      # (the artifact blob host is egress-blocked) and hands them to the owner.
      - name: Publish review batch
        if: ${{ inputs.confirm }}
        working-directory: asset-factory
        run: node cli.mjs publish-review ${{ inputs.category && format('--category {0}', inputs.category) || '' }}

      - name: Push review batch to the review branch
        if: ${{ inputs.confirm }}
        run: |
          git config user.name "asset-factory-bot"
          git config user.email "noreply@anthropic.com"
          git checkout --orphan review-tmp
          git reset
          git add -f asset-factory/review
          git commit -m "Review batch: ${{ inputs.category }} (run ${{ github.run_id }})"
          git push -f origin review-tmp:claude/asset-factory-review

      - name: Upload results (images + catalog)
        if: ${{ inputs.confirm }}
        uses: actions/upload-artifact@v4
        with:
          name: asset-factory-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            asset-factory/assets/**
            asset-factory/rejected/**
            asset-factory/duplicates/**
            asset-factory/database/catalog/**
            asset-factory/logs/**
