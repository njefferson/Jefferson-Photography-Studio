name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - claude/lost-session-info-huy4ha
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Creates the project on first run; served at the project's pages.dev URL.
          command: pages deploy dist --project-name=infrared-photography-studio --branch=main
