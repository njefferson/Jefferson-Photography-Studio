name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - claude/lost-session-info-huy4ha
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The build embeds the last 5 commits as the in-app changelog.
          fetch-depth: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Create the Pages project on first run; harmless (and ignored) afterwards.
      - name: Ensure Cloudflare Pages project exists
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create infrared-photography-studio --production-branch=main
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # staging branch -> preview URL (staging.infrared-photography-studio.pages.dev);
          # everything else -> production.
          command: pages deploy dist --project-name=infrared-photography-studio --branch=${{ github.ref_name == 'staging' && 'staging' || 'main' }} --commit-dirty=true
